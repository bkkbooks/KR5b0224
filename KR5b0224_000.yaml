front:
  text: 太上靈寶玉匱明真大齊言功儀化四
  hash: sha256:85b384bf54afbc307ca49739ca887e28a36cab4f0af45ce81890d971aff70040
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0224_HFL_000-001a, image: hfl/0293/0293-098.png}
body:
  text: 廣成先生杜光庭修衆官依位導引升壇念入户呪上五方香北方為始次上洞案香念上香呪各禮師存念如法宣衛靈呪鳴法鼓二十四通元上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者左右龍虎君侍香金童傳言玉女五帝直符直曰香官各三十六人出當召某處土地里域真官正神速出關啓臣今正爾燒香奉為某奉修靈寶九幽玉匱明真遷神大齊功圓事畢升壇拜表焚燒真文復職還官言功設醮重明功德願得太上十方正真生氣降流臣等身中所啓速達上御至真無極玉皇上帝御前人各三禮各稱法位上清玄都大洞三景弟子無上三洞法師奉行明真大齊法事某嶽某帝先生小兆真人臣某等今故燒香以是功德上為帝王太子皇后皇妃致福延禧保安國祚某廟皇帝尊靈遊宴玉京超凌宸極今故燒香歸身歸神歸命太上靈寶自然至真無上大道特乞玄造流恩洪𨤲廣被仙靈受度證品成真侍衛道君逍遙無上金闕七寶自然官永與道合啓啓玄感上御十方無極至真道前禮十方從東方起禮足各長跪歸命懴悔次三業懴三啓三禮次收真文內音東南西北中次弟子執真文於香煙上師靣壇中叩齒十二通呪曰元始大帝髙上玉皇普告十方無上無下無極神鄉三十二天隱韻靈章五文結氣八㑹流光今日大宥萬善敷張定名仙圖列籍紫房修齊行道介福遷神幽關朗晏𡨋夜開光超登三界景侍虛皇帝圖延永夀祚無疆萬真鑒祐四海太平妖星蕩滌中外康寧請如所告金馬驛程安真文於御案上待隨表焚之重稱法位上清玄都大洞三景弟子無上三洞法師奉行靈寶明真大齊法事某嶽某帝先生少兆真人臣某等謹重上啓太上無極大道元始天尊太上大道君太上老君自然至真靈寶天尊尋聲救苦大慈天尊五老上帝三十六部尊經玄中大法師三界內外應感尊靈臣等叨荷玄功幸逢道化三乘御運五氣開光正法流行普度幽顯人天荷賴生死霑榮而大教垂科開度為本上唯邦國資祐帝王使玄德遍覃神功遐布天地之內存殁同歡凡在群生常加濟護況奉明㫖敢不上聞次讀詞按如詞誠義深拯拔恭依玄式敷啓壇場燒香然燈轉經行道輒坡靈韞開露真文以八㑹寶書關明三界依時存注關告尊靈翹想十華馳心八極冀蒙玄鑒普降洪休法事功圓願念周普群真復駕返羽衛於太空萬聖回軒散祥輝於三境下照長夜廣度隂關大扇慈風咸除苦惱臣等按依科品瀝懇冥心以今月某日為始修崇齊醮行道轉經至某曰圓滿今修齊事竟所請天仙地仙真人神人五嶽四瀆九宫五帝三河四海日月星宿兵馬騎乘諸天監齊直事侍香金童散花玊女傳言奏事飛龍騎吏等及靈寶官屬監齊衛真四方監察真官監臨衛護宣通召命營衛齊事有功勤者今當别拜黃繒朱表言功舉遷臣等恐進止犯科不明玄奧乞垂赦宥仰戴玄恩啓齊之始所請智慧上品十戒齊事既畢謁還天宫後有法事當復啓請謹上啓聞伏須告報臣修齊事竟重明功德復諸天位拜黃繒朱表一通在臣前奉案之上請省表文次讀表具籙職奉行靈寶明真大齊法事某嶽某帝先生小兆真人臣某稽首再禮上啓太上無極大道至真自然金關下臣等禀質下凡自惟穢賤叨奉大法宣教度人下濟生靈上及邦國佐時效節質對幽明而於法無功動違科典夙夜震懼不敢遑寧臣等頓首頓首臣等受法之日盟告三官約當佐國立功奉揚玄化使天地之內道訓宣行濟拔存亡開度一切臣今欽奉皇帝聖㫖上叩大道奉為某廟皇帝尊靈證聖成真升入天府詞誠丹切披露聖神明明寸心感貫天地臣叨佩經法職主玄司欽奉綸音不勝震惕謹率同法道士若干人以內藏所出質信之禮依按玄科於某處置立靈壇法天象地四界八極玄應三清出八㑹真文內書寶字為天地神明之信奉修太上靈寶九幽玉匱明真大齊若干日夜稽顙歸命披心貢誠於太陽之前三光之下盟齊瀝懇然燈續明下照九幽無極世界九地重隂之中開諸光明照燭冥夜奉為某懴謝九玄億世宗廟先靈前身所有滯染塵緣積諸障纍恐未能於昭徹或尚致於𡨋行仰仗天恩咸希開釋離諸染看頓悟真常即使九土潜寧陵廟安穩魂神受鋉臟腑生華灌沐陽精消蕩隂滓五神扶衛騰景天堂世享福緣漸登道品垂祥後嗣延貺邦家帝祚隆昌皇圖克固聖朝納祐夀等嵩衡太子諸王咸臻景祐后妃公主永保福祥內外臣寮允新祿祚六合清靜兩耀光華吉應日聞妖惡殄滅如蒙所願永銜道恩謹當焚燒真文散灰揚煙上御諸天玄期有限不敢稽滯臣所修齊上請天仙兵馬神仙兵馬飛仙兵馬真人兵馬神人兵馬日月星宿兵馬九宫五帝兵馬三河四海兵馬五嶽四瀆兵馬各九億萬騎三十二天監齊直事侍香金帝散花玉女五帝直符傳言奏事飛龍騎吏等及靈寶官屬三寶威神此間土地里域真官諸是監臨衛護宣通召命營侍齊事有功勤者一切嚴裝隨臣今表上詣玄都列受功賞進品丄真加爵帝秩隨品署真髙下等級皆令顯逹一如太真之儀無令遺漏臣謹伏地拜黃素朱表一通上聞九天恩惟太丄無極大道太上大道君大上老君無上玄老十方自然靈寶天尊巳得道大聖衆至真諸君丈人垂哀省覽敕勒天官典者曲垂省理分别惟蒙至聖鑒映丹情臣等學法未備俯仰之格恐進止犯科不合儀式為四司所紏五帝所執千愆萬罪乞蒙赦宥哀原未悟不見罪罰恩惟太上分别求哀臣愚謹因真宫直使正一功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛能神龍天仙飛直騎吏各二十四人出操臣謹為某奉修靈寶九幽明真遷神拔度大齊事竟起壇遷職復諸天位重明功德拜奏黃素朱表一通上詣太上三夫曹伏須告報臣某誠惶誠恐稽首再拜以聞臣姓某屬某州縣宫觀住持太上無形無名虛無自然至真大道無上元尊金闕七寶玉陛下太歲某年某月日次叩齒三通啓曰臣謹重啓太上無極大道太上三尊十方大聖臣今拜奏表文願敕功曹典者主領進御必使上合天府應時行下閉氣升章徑御太上無極大道御前當令所請時下所召時到所申者通所遷者達若有下官故氣邀截表文不使上御者録付所在近司依律理罪以明天憲臣等伏待報應次露表案上存神如常訖起再拜收表封函次告金籙度命簡元始符命金籙白簡救苦真符告下十方無極世界三官九府百一十曹五帝考官九幽地獄巨天力士執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度齊壇係薦應度亡魂出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九真妙戒拔度功德上生諸天一如告命太歲某年某月日於某壇中告下讀文訖法師叩齒九通呪曰元始上聖玉帝髙靈玉文告命濟死度生金籙妙戒極護幽冥白簡寶符九真玄經解銷罪咎𡨚債和平救苦真人削除罪刑察命童子注上生名護戒威神引詣福庭超離五苦乘駕雲軿輪轉得道飛升上清呪畢以簡隨真文表函焚之聲讃二人侍節洞案捧案監齊主同詣天門焚表函真文白簡訖還復本位次告山簡今欽奉皇帝聖㫖於某處奉修靈寶九幽玉匱遷神明真大齊若干日夜行道事訖投簡靈山願神願仙飛行上清五嶽真人至神至靈乞削罪録上名九天請詣靈山金龍驛傳太歲某年某月日具位臣某於某處告文讀訖青𥿄封龍配之次弟子執於香煙上師叩齒十二通呪曰玄上開明元始監真上帝五老赤書丹文天地本始總領三元攝氣召㑹催促舉仙髙上符命普告十方日月星宿五嶽靈山天上地下冥靈大神監生主録南上三門關領玉簡勒名丹篇削落罪目上補帝臣修齊行道上告九天總校圖録削滅罪根魂神開度超出幽關行道事竟投簡靈山三塗罷對長夜蒙原𡨚仇釋散地府寧間福延大業祚永乾坤今日上告萬真咸聞請以龍簡關盟真官乞如所告金龍驛傅呪畢衆官再禮次讀水簡文今欽奉皇帝聖㫖於某處奉修靈寶九幽玉匱遷神眀真大齊若干日夜行道事訖投簡水府願神願仙三元同存九府水帝十二河源江河淮濟溟泠大神乞削罪録上名九天請詣水府金龍驛傳太歲某年某月日具位臣某於某處告文元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不關上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二泉源九府水帝溟泠大神今日上告萬願開陳修齊行道上告九天總校圖録削滅罪根幽夜開朗超度魂神三塗息苦長夜蒙原𡨚仇解散上升諸天行道事訖投簡靈淵福祚隆永帝業長延請以龍簡告盟水官乞如所陳金龍驛傳呪畢衆官再禮次讀土簡文今欽奉皇帝聖旨於某處奉修靈寶九幽玉匱遷神眀真大齊若干日夜行道事訖投簡靈壇願神願仙長生度世飛行上清中黃九土戊巳黃神土府五帝乞削罪刑請詣中宫投簡記名乞如所告金龍驛傳太歲某年某月日具位臣某於某處告文天地開張元氣分靈三元同存十方朗清五老上聞主死領生丹書赤文元始上經普告無下九地皇靈今日上告萬仙定生修齊行道上告九天總校圖録削滅罪根九地開朗遷度魂神太隂息苦六趣寧間和𡨚釋對上生諸天行道事竟投簡靈壇福流億世帝祚長延請以龍簡告盟地官乞如所告金龍驛傳呪畢衆官再拜投簡於壇上天井中或埋於月辰之上次吟投龍讃祈真登紫府全章次稱名位降神設醮具法職奉行靈寶明真大齊法事某嶽某帝先生小兆真人臣某等稽首再禮臣謹奉皇帝修建遷神大齊謹奉降玉京玄都紫微上宫十方大聖衆至真諸君丈人飛仙真人玉童玉女應感分輝降臨醮座謹奉降天地靈仙諸天上聖日君月君日月帝君真人神仙玉童玉女降臨醮座謹奉降北極句陳天皇大帝君北斗七星君南斗六星君三台六星君二十八宿君周天三百六十五度星中大神星中帝君星中真人降臨醮座謹上請東方青帝九氣君南方赤帝三氣君西方白帝七氣君北方黑帝五氣君中央黃帝一氣君五帝真人玉童玉女降臨醮座謹上請三元君上元天官中元地官下元水官三宫九府百二十曹五嶽大神十大洞天三十六洞天二十四化三河四海九江水帝十二河源九宫真人十二仙君九天司命五嶽丈人九天使者儲副正職佐命大神天仙地仙飛仙神仙玉童玉女兵馬騎乘降臨醮座謹上請三洞四輔侍經真官仙公仙伯仙卿大夫九天御史玄中大法師天師嗣師系師上古三師經師籍師度師三洞威神三寶官屬降臨醮座謹上請靈寶官屬領仙監齊直符真官侍香將吏玉童玉女六甲神將六旬玉女六丁玉女社稷將吏一切靈司降臨醮座謹請身中所佩二十四治執節監功大將軍四部監功謁者上仙上靈直使正一功曹三部功曹促氣功曹三五功曹等降臨醮座謹請身中所佩隂陽神決吏科車赤符吏剛風騎置驛馬上章吏飛龍騎吏天真飛仙騎吏上部使者中部使者都官使者郎吏虎賁察姦句騎吏都官僕射天丁力士天騶甲卒等降臨醮座謹請收氣食氣吏收神食神吏收鬼食鬼吏收邪食邪吏收精食精吏收毒食毒吏誅符破廟吏等降臨醮座謹奉請某皇帝本命神將元辰神將大小行年本命星官驛馬將吏等降臨醮座謹奉請四司五帝應感真靈三界職司衛壇將吏虛空監察直日直符當界主司等降臨醮座奉請當處土地里域真官降臨醮座臣謹上啓太上三尊昊天上帝十方上聖三光九耀天帝天君三界內外一切真靈伏願普降洪慈分輝照鑒臣以夙承餘福得誕今生叨佩靈文禀修玄教功輕塵露過重丘山誠宜束身以自修檢而法許開度佐國立功輔助帝王宣弘道化今欽奉皇帝聖旨追薦某尊靈齎金龍紋繒香花質信恭依科典虔立靈壇奉修靈寶九幽明真玉匱遷神拔度大齊若干日夜以某日某時功圓事畢焚燒真文解壇復職重明功德設醮言功願為某懴謝罪尤解銷𡨚對不經幽夜升入天堂瑩質朱陵錬神丹霍上朝太極飛步九清友萬帝以優游接羣真而宴處延休帝業貽貺孫謀傳鳯曆於無疆固鴻圖於億載同文共軌地久天長疫毒潜寧災凶殄息兵戈不作水旱無侵夷夏歡康龍神翊衛中黃上府陵寢常安十雨五風生靈永泰伏冀三官拂簡紀録齊功五帝回軒鑒臨勝福告下天地曹府幽明職司降祐垂祥普均四海臣等不任懇願虔祈之至稽首再禮次焚狀奏獻錢馬臣重啓靈壇感降內外真靈臣所修齊功德成就實賴三寶官屬應感職司降此洪休副兹丹懇啓奏傳送勞歷真官恐薦獻失儀違犯科典動靜俯仰不合天儀再具披陳特乞原赦髙真上聖升駕太空三界尊靈各還所部侍衛官吏當境職司未就座者歆納誠禮隂陽將吏內外正神佐國度人立功利物驅除氛沴掃蕩妖凶使九土太平帝王萬壽三㑹之日别當舉遷諸獄冥曹三徒六趣九幽滯爽萬類孤魂賴兹遷拔之緣盡詣逍遙之境某等稽首再禮奉辭次送神頌還戒頌都講云衆官復職髙功都講列職各納職次十二願次復爐次引弟子隨師升天門出地戶次解壇頌出戶呪次辭三師次回向禮畢化四十四太上靈寶玉匱明真大齊言功儀終
